<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>세미나 참석 신청</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #f5f0ff 100%);
      min-height: 100vh;
      padding: 40px 16px 60px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    /* 헤더 카드 */
    .header-card {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 22px;
      padding: 42px 36px 38px;
      color: #fff;
      margin-bottom: 18px;
      box-shadow: 0 10px 36px rgba(79,70,229,0.28);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.32);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 18px;
    }

    .header-card h1 {
      font-size: 23px;
      font-weight: 800;
      line-height: 1.5;
      margin-bottom: 28px;
      letter-spacing: -0.01em;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .info-item {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .info-item.full { grid-column: 1 / -1; }

    .info-item .ilabel {
      font-size: 11px;
      opacity: 0.72;
      font-weight: 600;
      margin-bottom: 5px;
      letter-spacing: 0.04em;
    }

    .info-item .ivalue {
      font-size: 14px;
      font-weight: 700;
    }

    /* 폼 카드 */
    .form-card {
      background: #fff;
      border-radius: 22px;
      padding: 38px 36px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.07);
    }

    .form-title {
      font-size: 17px;
      font-weight: 800;
      color: #1e1b4b;
      margin-bottom: 6px;
    }

    .form-desc {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* 필드 */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 18px;
    }

    .field-group label {
      font-size: 13px;
      font-weight: 700;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .req { color: #ef4444; font-size: 13px; }

    .field-group input {
      width: 100%;
      padding: 13px 15px;
      border: 1.5px solid #e5e7eb;
      border-radius: 11px;
      font-size: 14px;
      color: #111827;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      font-family: inherit;
      background: #fafafa;
    }

    .field-group input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
      background: #fff;
    }

    .field-group input::placeholder { color: #b0b7c3; }

    /* 제출 버튼 */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      border: none;
      border-radius: 13px;
      cursor: pointer;
      transition: all 0.22s ease;
      margin-top: 10px;
      font-family: inherit;
      letter-spacing: 0.02em;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(79,70,229,0.38);
    }

    .submit-btn:active:not(:disabled) { transform: translateY(0); }

    .submit-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    /* 에러 */
    .error-msg {
      display: none;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 11px 15px;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }

    .error-msg.show { display: block; }

    /* 안내 */
    .privacy-note {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 16px;
      line-height: 1.6;
    }

    /* 완료 화면 */
    .result-screen {
      display: none;
      text-align: center;
      padding: 20px 10px 10px;
    }

    .result-screen.show { display: block; }

    .check-circle {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      margin: 0 auto 22px;
      box-shadow: 0 8px 24px rgba(79,70,229,0.3);
    }

    .result-screen h2 {
      font-size: 21px;
      font-weight: 800;
      color: #1e1b4b;
      margin-bottom: 10px;
    }

    .result-screen .result-sub {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .result-screen .result-sub .em {
      color: #4f46e5;
      font-weight: 700;
    }

    .result-info-box {
      background: #f5f3ff;
      border: 1px solid #e0d9ff;
      border-radius: 14px;
      padding: 18px 20px;
      text-align: left;
    }

    .result-info-box .ritem {
      display: flex;
      gap: 10px;
      font-size: 14px;
      color: #3730a3;
      font-weight: 600;
      padding: 5px 0;
    }

    .result-info-box .ritem:not(:last-child) {
      border-bottom: 1px solid #ede9fe;
      padding-bottom: 10px;
      margin-bottom: 5px;
    }

    @media (max-width: 480px) {
      .header-card { padding: 28px 20px 26px; }
      .form-card { padding: 26px 20px; }
      .info-grid { grid-template-columns: 1fr; }
      .header-card h1 { font-size: 19px; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- 세미나 안내 헤더 -->
  <div class="header-card">
    <div class="badge">📋 참석 신청</div>
    <h1>AI 시대에 맞는<br>스마트한 업무 활용</h1>
    <div class="info-grid">
      <div class="info-item">
        <div class="ilabel">📅 일시</div>
        <div class="ivalue">2026년 6월 12일 (금)</div>
      </div>
      <div class="info-item">
        <div class="ilabel">⏰ 시간</div>
        <div class="ivalue">오후 2시 – 4시</div>
      </div>
      <div class="info-item full">
        <div class="ilabel">📍 장소</div>
        <div class="ivalue">역삼 피플에듀</div>
      </div>
    </div>
  </div>

  <!-- 신청 폼 -->
  <div class="form-card">

    <!-- 입력 폼 -->
    <div id="form-wrap">
      <p class="form-title">참석자 정보 입력</p>
      <p class="form-desc">아래 정보를 입력하시면 신청 완료 안내 메일을 발송해 드립니다.</p>

      <div class="field-group">
        <label>성함 <span class="req">*</span></label>
        <input type="text" id="f-name" placeholder="홍길동" autocomplete="name" />
      </div>

      <div class="field-group">
        <label>회사명 <span class="req">*</span></label>
        <input type="text" id="f-company" placeholder="(주)회사명" autocomplete="organization" />
      </div>

      <div class="field-group">
        <label>이메일 <span class="req">*</span></label>
        <input type="email" id="f-email" placeholder="example@company.com" autocomplete="email" />
      </div>

      <div class="error-msg" id="err-msg">입력값을 확인해 주세요.</div>

      <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
        신청 완료하기 →
      </button>

      <p class="privacy-note">
        입력하신 정보는 세미나 안내 목적으로만 사용되며,<br>행사 종료 후 즉시 삭제됩니다.
      </p>
    </div>

    <!-- 완료 화면 -->
    <div class="result-screen" id="result-screen">
      <div class="check-circle">✓</div>
      <h2>신청이 완료되었습니다!</h2>
      <p class="result-sub">
        입력하신 이메일로<br>
        <span class="em">세미나 안내 메일</span>이 발송되었습니다.
      </p>
      <div class="result-info-box">
        <div class="ritem">📅 <span>2026년 6월 12일 (금)</span></div>
        <div class="ritem">⏰ <span>오후 2시 – 4시</span></div>
        <div class="ritem">📍 <span>역삼 피플에듀</span></div>
      </div>
    </div>

  </div>
</div>

<script>
  // =========================================================
  //  ① EmailJS 설정 — 아래 3가지 값을 교체하세요
  // =========================================================
  const EMAILJS_PUBLIC_KEY  = "rCnYGkZPp7W75hjkK";    // EmailJS 계정 > Account > Public Key
  const EMAILJS_SERVICE_ID  = "service_j7hog3c";    // Email Services 에서 확인
  const EMAILJS_TEMPLATE_ID = "template_or9hue7";   // Email Templates 에서 확인

  // =========================================================
  //  ② Google Sheets 설정 — Apps Script 배포 URL 을 교체하세요
  // =========================================================
  const SHEETS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXQNB61D8Qpc0iS5OOOBIp_ukcMpqF5SArGcAtKIqM9cePU_XMQLGspUaLLoqORr0kuw/exec";
  // =========================================================

  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

  async function handleSubmit() {
    const name    = document.getElementById('f-name').value.trim();
    const company = document.getElementById('f-company').value.trim();
    const email   = document.getElementById('f-email').value.trim();
    const errEl   = document.getElementById('err-msg');
    const btn     = document.getElementById('submit-btn');

    // 유효성 검사
    if (!name || !company || !email) {
      showError('모든 항목을 입력해 주세요.');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('올바른 이메일 주소를 입력해 주세요.');
      return;
    }

    errEl.classList.remove('show');
    btn.disabled = true;
    btn.textContent = '처리 중...';

    const now = new Date();
    const submitTime = now.toLocaleString('ko-KR', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });

    try {
      // ── ① Google Sheets 저장 ──────────────────────────
      await fetch(SHEETS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, company, email, submitTime })
      });

      // ── ② EmailJS 자동 회신 ───────────────────────────
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_name:     name,
        to_email:    email,
        company:     company,
        event_date:  "2026년 6월 12일 (금)",
        event_time:  "오후 2시 ~ 4시",
        event_place: "역삼 피플에듀",
        event_title: "AI 시대에 맞는 스마트한 업무 활용"
      });

      // 완료 화면 전환
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('result-screen').classList.add('show');

    } catch (err) {
      console.error(err);
      btn.disabled = false;
      btn.textContent = '신청 완료하기 →';
      showError('오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
    }
  }

  function showError(msg) {
    const el = document.getElementById('err-msg');
    el.textContent = msg;
    el.classList.add('show');
  }
</script>
</body>
</html>
